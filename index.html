<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEPCO Bill Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

  <div class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full">
    
    <div class="text-center mb-6">
      <h2 class="text-2xl font-bold text-gray-900">GEPCO Bill Checker</h2>
      <p class="text-sm text-gray-500">Pure HTML Test Version</p>
    </div>

    <div class="flex gap-2 mb-4">
      <button id="tabRefno" class="flex-1 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white transition-colors" onclick="switchTab('refno')">
        Reference Number
      </button>
      <button id="tabCustid" class="flex-1 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-600 transition-colors" onclick="switchTab('custid')">
        Consumer ID
      </button>
    </div>

    <div class="mb-4">
      <input
        id="billInput"
        type="text"
        class="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-blue-500 outline-none font-mono text-lg"
        placeholder="Enter 14-digit Reference"
        inputmode="numeric"
        autocomplete="off"
      />
    </div>

    <button id="checkBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-md" onclick="doCheckBill()">
      Check Bill Now
    </button>

    <div id="statusBox" class="mt-4 hidden p-3 rounded-lg text-sm font-medium bg-red-50 text-red-700 border border-red-200 text-center"></div>

  </div>

  <script>
    let currentTab = 'refno';
    
    const input = document.getElementById('billInput');
    const tabRefno = document.getElementById('tabRefno');
    const tabCustid = document.getElementById('tabCustid');
    const statusBox = document.getElementById('statusBox');

    // Restrict input to numbers only
    input.addEventListener('input', function(e) {
      this.value = this.value.replace(/[^0-9]/g, '');
    });

    // Check bill on "Enter" key
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doCheckBill();
    });

    function switchTab(tab) {
      currentTab = tab;
      
      if (tab === 'refno') {
        input.placeholder = 'Enter 14-digit Reference';
        input.maxLength = 14;
        tabRefno.className = 'flex-1 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white transition-colors';
        tabCustid.className = 'flex-1 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-600 transition-colors';
      } else {
        input.placeholder = 'Enter 10-digit Consumer ID';
        input.maxLength = 10;
        tabCustid.className = 'flex-1 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white transition-colors';
        tabRefno.className = 'flex-1 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-600 transition-colors';
      }
      
      input.value = '';
      statusBox.classList.add('hidden');
    }

    function doCheckBill() {
      const val = input.value;
      
      // Basic validation
      if (currentTab === 'refno' && val.length !== 14) {
        showError('Please enter exactly 14 digits.');
        return;
      }
      if (currentTab === 'custid' && val.length !== 10) {
        showError('Please enter exactly 10 digits.');
        return;
      }

      statusBox.classList.add('hidden');

      // THE CORE LOGIC: Hit the legacy .aspx endpoint, not /general
      const param = currentTab === 'refno' ? 'refno' : 'appno';
      const finalURL = `https://bill.pitc.com.pk/gbill.aspx?${param}=${val}`;

      console.log("Attempting to open:", finalURL);

      // THE STEALTH REDIRECT: Hides where the click came from
      const link = document.createElement('a');
      link.href = finalURL;
      link.target = '_blank';
      link.rel = 'noreferrer noopener'; // This is the magic that bypasses PITC's block
      
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function showError(msg) {
      statusBox.innerText = '⚠️ ' + msg;
      statusBox.classList.remove('hidden');
    }
  </script>
</body>
</html>
